services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    ports:
      - "8554:8554"
      - "8889:8889"
    networks:
      - iptv-net
    restart: unless-stopped
    environment:
      - MTX_RTSPTRANSPORTS=tcp
      - MTX_LOGLEVEL=warn
      - MTX_API=yes
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9997/v3/paths/list || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  iptv-app:
    image: maksimignatov1337/myiptv:latest
    container_name: myiptv
    environment:
      - TZ=Europe/Moscow
      # VIDEOS_BASE=/app/videos  # путь к папке с видео (по умолчанию /app/videos)
      # AUDIO_TRACK=0            # дефолтная аудиодорожка если не задана в конфиге
      # RTSP_URL=rtsp://mediamtx:8554/stream
    volumes:
      - /mnt/nas/torrents/cartoons:/app/videos   # все шоу доступны как /app/videos/<название папки>
      - ./config.myiptv:/app/config.myiptv
      # ./assets:/app/assets  # раскомментировать чтобы переопределить логотип без пересборки образа
      - ./data:/app/data                         # история просмотров (played.json)
    depends_on:
      mediamtx:
        condition: service_healthy
    networks:
      - iptv-net
    restart: unless-stopped

networks:
  iptv-net:
    driver: bridge
