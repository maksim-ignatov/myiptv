services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    ports:
      - "8554:8554"
      - "8889:8889"
    networks:
      - iptv-net
    restart: unless-stopped
    environment:
      - MTX_RTSPTRANSPORTS=tcp
      - MTX_LOGLEVEL=warn
      - MTX_API=yes
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9997/v3/paths/list || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  iptv-app:
    image: maksimignatov1337/myiptv:latest
    container_name: myiptv
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./videos:/app/videos
      - /mnt/nas/torrents/cartoons/South Park:/app/videos/late_evening
      - ./audio_config.myiptv:/app/audio_config.myiptv
    depends_on:
      mediamtx:
        condition: service_healthy
    networks:
      - iptv-net
    restart: unless-stopped

networks:
  iptv-net:
    driver: bridge
